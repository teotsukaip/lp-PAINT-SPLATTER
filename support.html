<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAINT SPLATTER サポート</title>
  <meta
    name="description"
    content="iPhoneアプリ「PAINT SPLATTER」のサポートページ。お問い合わせ先と対応内容をご案内します。"
  >
  <style>
    :root {
      --bg: #0e0f1b;
      --text: #f2f4ff;
      --text-sub: #b4bad6;
      --accent-1: #ff3f80;
      --accent-2: #44d9ff;
      --accent-3: #ffe248;
      --card: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.18);
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 10%, rgba(255, 63, 128, 0.24), transparent 38%),
        radial-gradient(circle at 85% 0%, rgba(68, 217, 255, 0.22), transparent 36%),
        radial-gradient(circle at 50% 90%, rgba(255, 226, 72, 0.16), transparent 40%),
        var(--bg);
      line-height: 1.65;
    }

    .wrapper {
      width: min(720px, 92%);
      margin: 0 auto;
    }

    .nav {
      padding: 20px 0 0;
    }

    .nav a {
      color: var(--accent-2);
      text-decoration: none;
      font-size: 0.95rem;
    }

    .nav a:hover {
      text-decoration: underline;
    }

    header {
      padding: 40px 0 28px;
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      background: linear-gradient(90deg, rgba(255, 63, 128, 0.25), rgba(68, 217, 255, 0.25));
      border: 1px solid var(--border);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      line-height: 1.15;
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 18px 0 0;
      color: var(--text-sub);
      font-size: 1.05rem;
    }

    main {
      padding-bottom: 48px;
    }

    section {
      margin-bottom: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 22px 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.1rem;
      letter-spacing: 0.03em;
      color: var(--text);
    }

    .card p {
      margin: 0 0 10px;
      color: var(--text-sub);
      font-size: 0.98rem;
    }

    .card p:last-child {
      margin-bottom: 0;
    }

    .email {
      margin-top: 4px;
    }

    .email a {
      color: var(--accent-2);
      font-weight: 600;
      text-decoration: none;
      word-break: break-all;
    }

    .email a:hover {
      text-decoration: underline;
    }

    ul {
      margin: 0;
      padding-left: 1.2em;
      color: var(--text-sub);
      font-size: 0.98rem;
    }

    li {
      margin-bottom: 6px;
    }

    li:last-child {
      margin-bottom: 0;
    }

    dl {
      margin: 0;
      display: grid;
      gap: 10px 16px;
      grid-template-columns: auto 1fr;
      color: var(--text-sub);
      font-size: 0.98rem;
    }

    dt {
      margin: 0;
      font-weight: 600;
      color: var(--text);
    }

    dd {
      margin: 0;
    }

    .mono {
      font-size: 0.92em;
      color: var(--accent-3);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }

    footer {
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      padding: 18px 0 28px;
      color: #8f95b8;
      font-size: 0.86rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <nav class="nav" aria-label="サイト内">
      <a href="index.html">← アプリ紹介へ</a>
    </nav>

    <header>
      <span class="eyebrow">Support</span>
      <h1>PAINT SPLATTER サポート</h1>
      <p class="lead">「PAINT SPLATTER」をご利用いただきありがとうございます。</p>
    </header>

    <main>
      <section class="card" aria-labelledby="contact-heading">
        <h2 id="contact-heading">お問い合わせ</h2>
        <p>不具合・ご質問は以下までご連絡ください。</p>
        <p class="email">
          Email:
          <a href="mailto:support@corevista.jp">support@corevista.jp</a>
        </p>
      </section>

      <section class="card" aria-labelledby="scope-heading">
        <h2 id="scope-heading">対応内容</h2>
        <ul>
          <li>アプリの使い方に関するお問い合わせ</li>
          <li>不具合報告</li>
          <li>ご意見・ご要望</li>
        </ul>
      </section>

      <section class="card" aria-labelledby="app-info-heading">
        <h2 id="app-info-heading">アプリ情報</h2>
        <dl>
          <dt>アプリ名</dt>
          <dd>PAINT SPLATTER</dd>
          <dt>Bundle ID</dt>
          <dd><code class="mono">jp.corevista.paintbecha</code></dd>
        </dl>
      </section>
    </main>
  </div>

  <footer>
    PAINT SPLATTER · Support
  </footer>
</body>
</html>
